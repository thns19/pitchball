<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSL2 History — Pitchball</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container" style="max-width:900px;">
  <div class="nav">
    <a href="hub.html" class="back">← PSL2</a>
  </div>
  <h1>PSL2 — Season History</h1>
  <p class="subtitle">The second Pitchball Super League season, consisting of 16 teams.</p>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('league')">Group Stage</button>
    <button class="tab-btn" onclick="showTab('bracket')">Knockout Stage</button>
  </div>

  <!-- GROUP STAGE -->
  <div id="tab-league">
    <p style="font-size:12px;color:#888;margin-bottom:1.5rem;">Win = 3pts · Draw = 2pts · Loss = 1pt · Top 2 from each group advance to Quarter-Finals</p>

    <div class="groups-grid" id="groups-container"></div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#4caf7d;"></div> Qualified</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e0e0d8;"></div> Eliminated</div>
    </div>
  </div>

  <!-- KNOCKOUT STAGE -->
  <div id="tab-bracket" style="display:none;">
    <p style="font-size:12px;color:#888;margin-bottom:1.5rem;">Quarter-Finals · Semi-Finals · Third Place · Final</p>
    <div class="bracket-wrap">
      <div class="bracket" id="bracket"></div>
    </div>
  </div>
</div>

<style>
.groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 1.5rem; }
.group-card { background: #fff; border: 1px solid #e0e0d8; border-radius: 12px; padding: 1.25rem; }
.group-title { font-size: 14px; font-weight: 500; color: #1a1a1a; margin-bottom: 10px; }
.group-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 0.75rem; }
.group-table th { color: #888; padding: 3px 6px; text-align: center; border-bottom: 1px solid #f0f0ec; font-weight: 500; }
.group-table th:first-child { text-align: left; }
.group-table td { padding: 5px 6px; text-align: center; border-bottom: 1px solid #f0f0ec; color: #1a1a1a; }
.group-table td:first-child { text-align: left; font-weight: 500; }
.group-table tr:last-child td { border-bottom: none; }
.group-qual { border-left: 3px solid #4caf7d; }
.group-elim { border-left: 3px solid #e0e0d8; }
.fixtures-title { font-size: 11px; color: #888; margin-bottom: 5px; font-weight: 500; margin-top: 10px; }
.group-fixture { display: flex; align-items: center; gap: 6px; font-size: 11px; padding: 3px 0; border-bottom: 1px solid #f0f0ec; }
.group-fixture:last-child { border-bottom: none; }
.gf-team { flex: 1; color: #1a1a1a; }
.gf-team.right { text-align: right; }
.gf-score { font-weight: 500; color: #4caf7d; min-width: 36px; text-align: center; }
.deduction-icon { display: inline-block; cursor: help; font-size: 11px; background: #fff3cd; color: #856404; border-radius: 3px; padding: 1px 4px; margin-left: 4px; position: relative; font-weight: 500; }
.deduction-icon .tooltip { display: none; position: fixed; background: #1a1a1a; color: #fff; font-size: 11px; padding: 6px 10px; border-radius: 6px; white-space: pre-line; min-width: 220px; line-height: 1.5; z-index: 999; pointer-events: none; }
.deduction-icon:hover .tooltip { display: block; }
</style>

<script>
const LOGOS = {
  "AXR":"logos/axr.png","Melpon":"logos/melpon.png","Nikolado":"logos/nikolado.png",
  "Grivnikikos":"logos/grivnikikos.png","R1":"logos/r1.png","Taximi":"logos/taximi.png",
  "Kalyma":"logos/kalyma.png","Panannaikos":"logos/panannaikos.png","Brazil":"logos/brazil.png",
  "Mpesala":"logos/mpesala.png","Oi Kapoioi":"logos/oikapoioi.png","Karronios":"logos/karronios.png",
  "Temachio":"logos/temachio.png","Maralers":"logos/maralers.png","S Tiers":"logos/stiers.png",
  "Koseveikos":"logos/koseveikos.png"
};
function tlogo(name, size=14){
  return LOGOS[name] ? `<img src="${LOGOS[name]}" onerror="this.style.display='none'" style="width:${size}px;height:${size}px;object-fit:contain;border-radius:2px;vertical-align:middle;margin-right:4px;">` : '';
}

const PENALTY = {
  "AXR": -1, "Nikolado": -1, "Panannaikos": -9
};
const PENALTY_INFO = {
  "AXR": "1 point deducted by\nPitchball Administration",
  "Nikolado": "1 point deducted by\nPitchball Administration",
  "Panannaikos": "Forfeited all league matches\n(-9 points deducted)"
};

const groups = [
  {
    name: "Group A",
    teams: ["AXR","Melpon","Nikolado","Grivnikikos"],
    fixtures: [
      {md:1, h:"AXR",       a:"Nikolado",    hs:5, as:3},
      {md:1, h:"Grivnikikos",a:"Melpon",      hs:2, as:5},
      {md:2, h:"AXR",       a:"Grivnikikos",  hs:5, as:0},
      {md:2, h:"Nikolado",  a:"Melpon",       hs:3, as:5},
      {md:3, h:"AXR",       a:"Melpon",       hs:5, as:3},
      {md:3, h:"Nikolado",  a:"Grivnikikos",  hs:5, as:0},
    ]
  },
  {
    name: "Group B",
    teams: ["R1","Taximi","Kalyma","Panannaikos"],
    fixtures: [
      {md:1, h:"R1",         a:"Panannaikos", hs:5, as:0},
      {md:1, h:"Taximi",     a:"Kalyma",      hs:5, as:2},
      {md:2, h:"R1",         a:"Kalyma",      hs:5, as:3},
      {md:2, h:"Panannaikos",a:"Taximi",      hs:0, as:5},
      {md:3, h:"R1",         a:"Taximi",      hs:5, as:3},
      {md:3, h:"Panannaikos",a:"Kalyma",      hs:0, as:5},
    ]
  },
  {
    name: "Group C",
    teams: ["Brazil","Mpesala","Oi Kapoioi","Karronios"],
    fixtures: [
      {md:1, h:"Brazil",    a:"Oi Kapoioi", hs:5, as:0},
      {md:1, h:"Mpesala",   a:"Karronios",  hs:5, as:0},
      {md:2, h:"Brazil",    a:"Karronios",  hs:5, as:0},
      {md:2, h:"Mpesala",   a:"Oi Kapoioi", hs:5, as:0},
      {md:3, h:"Brazil",    a:"Mpesala",    hs:5, as:1},
      {md:3, h:"Oi Kapoioi",a:"Karronios",  hs:5, as:0},
    ]
  },
  {
    name: "Group D",
    teams: ["Temachio","Maralers","S Tiers","Koseveikos"],
    fixtures: [
      {md:1, h:"Temachio", a:"Koseveikos", hs:5, as:2},
      {md:1, h:"Maralers", a:"S Tiers",    hs:5, as:1},
      {md:2, h:"Temachio", a:"S Tiers",    hs:5, as:2},
      {md:2, h:"Maralers", a:"Koseveikos", hs:5, as:0},
      {md:3, h:"Temachio", a:"Maralers",   hs:5, as:1},
      {md:3, h:"S Tiers",  a:"Koseveikos", hs:5, as:0},
    ]
  }
];

const knockoutRounds = [
  {
    title: "Quarter-Finals",
    isFinal: false,
    matches: [
      {h:"R1",      a:"Mpesala",  hs:7,  as:9},
      {h:"Brazil",  a:"Melpon",   hs:7,  as:1},
      {h:"AXR",     a:"Maralers", hs:7,  as:4},
      {h:"Temachio",a:"Taximi",   hs:7,  as:9},
    ]
  },
  {
    title: "Semi-Finals",
    isFinal: false,
    matches: [
      {h:"Mpesala", a:"Brazil", hs:5,  as:10},
      {h:"AXR",     a:"Taximi", hs:10, as:1},
    ]
  },
  {
    title: "Third Place",
    isFinal: false,
    matches: [
      {h:"Mpesala", a:"Taximi", hs:5, as:7},
    ]
  },
  {
    title: "Final",
    isFinal: true,
    matches: [
      {h:"Brazil", a:"AXR", hs:15, as:13},
    ]
  }
];

function computeStandings(teams, fixtures) {
  const s = {};
  teams.forEach(t => s[t] = {team:t, p:0, w:0, d:0, l:0, gf:0, ga:0, gd:0, pts: PENALTY[t]||0});
  fixtures.forEach(f => {
    const h=s[f.h], a=s[f.a];
    h.p++; a.p++;
    h.gf+=f.hs; h.ga+=f.as; a.gf+=f.as; a.ga+=f.hs;
    h.gd+=f.hs-f.as; a.gd+=f.as-f.hs;
    if(f.hs>f.as){h.w++;h.pts+=3;a.l++;a.pts+=1;}
    else if(f.as>f.hs){a.w++;a.pts+=3;h.l++;h.pts+=1;}
    else{h.d++;a.d++;h.pts+=2;a.pts+=2;}
  });
  return Object.values(s).sort((a,b)=>{
    if(b.pts!==a.pts) return b.pts-a.pts;
    if(b.gd!==a.gd) return b.gd-a.gd;
    return b.gf-a.gf;
  });
}

function renderGroups() {
  document.getElementById('groups-container').innerHTML = groups.map(g => {
    const standings = computeStandings(g.teams, g.fixtures);
    const rows = standings.map((r,i) => {
      const cls = i < 2 ? 'group-qual' : 'group-elim';
      const ptsStyle = r.pts < 0 ? 'color:#c0392b;' : '';
      const deduct = PENALTY_INFO[r.team]
        ? `<span class="deduction-icon">!<span class="tooltip">${PENALTY_INFO[r.team]}</span></span>` : '';
      return `<tr class="${cls}">
        <td>${tlogo(r.team)}${r.team}${deduct}</td>
        <td>${r.p}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td>
        <td>${r.gd>0?'+':''}${r.gd}</td>
        <td><strong style="${ptsStyle}">${r.pts}</strong></td>
      </tr>`;
    }).join('');

    const byMd = {};
    g.fixtures.forEach(f => { if(!byMd[f.md]) byMd[f.md]=[]; byMd[f.md].push(f); });
    const fixHTML = Object.keys(byMd).sort((a,b)=>a-b).map(md => `
      <div class="fixtures-title">Matchday ${md}</div>
      ${byMd[md].map(f=>`
        <div class="group-fixture">
          <span class="gf-team right">${f.h}${tlogo(f.h)}</span>
          <span class="gf-score">${f.hs}–${f.as}</span>
          <span class="gf-team">${tlogo(f.a)}${f.a}</span>
        </div>`).join('')}`).join('');

    return `<div class="group-card">
      <div class="group-title">${g.name}</div>
      <table class="group-table">
        <thead><tr><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div>${fixHTML}</div>
    </div>`;
  }).join('');
}

function renderBracket() {
  document.getElementById('bracket').innerHTML = knockoutRounds.map(round => {
    return `<div class="bracket-round">
      <div class="bracket-round-title">${round.title}</div>
      <div class="bracket-matches">
        ${round.matches.map(m => {
          const hWon = m.hs > m.as;
          return `<div class="bracket-match${round.isFinal?' final-match':''}">
            <div class="bracket-team ${hWon?'winner':'loser'}">
              <span>${tlogo(m.h,14)}${m.h}</span>
              <span class="bracket-score">${m.hs}</span>
            </div>
            <div class="bracket-team ${!hWon?'winner':'loser'}">
              <span>${tlogo(m.a,14)}${m.a}</span>
              <span class="bracket-score">${m.as}</span>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function showTab(tab) {
  document.getElementById('tab-league').style.display = tab==='league' ? 'block' : 'none';
  document.getElementById('tab-bracket').style.display = tab==='bracket' ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0&&tab==='league')||(i===1&&tab==='bracket'));
  });
}

renderGroups();
renderBracket();

document.addEventListener('mousemove', e => {
  document.querySelectorAll('.deduction-icon .tooltip').forEach(t => {
    t.style.left = (e.clientX + 12) + 'px';
    t.style.top = (e.clientY + 12) + 'px';
  });
});
</script>
</body>
</html>
