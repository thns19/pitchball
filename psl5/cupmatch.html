<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cup Match — PSL5</title>
<link rel="stylesheet" href="style.css">
<style>
/* ── Cup theme overrides ── */
body{background-image:url("cupbg.png");background-size:cover;background-position:center;background-attachment:fixed;background-repeat:no-repeat;color:#0a2a22;}
h1,p,.back{color:#0a2a22!important;}
.back:hover{color:#000!important;}

.match-header{background:rgba(255,255,255,0.88);border:1px solid rgba(0,0,0,0.12);border-radius:12px;padding:1.25rem 1rem;margin-bottom:1rem;text-align:center;}
.match-teams{display:flex;align-items:center;justify-content:center;gap:0.5rem;margin-bottom:0.75rem;}
.match-team{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;}
.match-team-logo{width:48px;height:48px;object-fit:contain;border-radius:8px;background:rgba(0,0,0,0.06);padding:3px;}
.match-team-name{font-size:13px;font-weight:500;color:#0a2a22;text-align:center;line-height:1.3;word-break:break-word;}
.match-score{font-size:42px;font-weight:500;color:#0a6640;line-height:1;min-width:70px;text-align:center;flex-shrink:0;}
.match-meta{font-size:11px;color:#555;margin-top:8px;line-height:1.6;}
.match-meta span{display:inline-block;margin:0 4px;}

.cup-badge{display:inline-block;font-size:11px;font-weight:600;color:#0a6640;background:rgba(10,102,64,0.1);border:1px solid rgba(10,102,64,0.3);border-radius:6px;padding:2px 8px;margin-top:6px;}

.mvp-card{background:rgba(255,255,255,0.88);border:1px solid #c8a800;border-radius:12px;padding:0.9rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:12px;}
.mvp-label{font-size:11px;color:#666;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;}
.mvp-name{font-size:14px;font-weight:500;color:#7a6000;margin-top:2px;}

.events-card{background:rgba(255,255,255,0.88);border:1px solid rgba(0,0,0,0.12);border-radius:12px;overflow:hidden;margin-bottom:1rem;}
.events-title{font-size:11px;color:#555;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;padding:10px 14px;border-bottom:1px solid rgba(0,0,0,0.08);}
.event-row{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid rgba(0,0,0,0.06);gap:8px;}
.event-row:last-child{border-bottom:none;}
.event-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;}
.icon-goal{background:#d4f0e2;color:#0a6640;}
.icon-og{background:#fde8e8;color:#c0392b;}
.icon-sub{background:#dbeafe;color:#1e40af;}
.event-body{flex:1;min-width:0;}
.event-main{font-size:13px;color:#0a2a22;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.event-detail{font-size:11px;color:#666;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.event-score{font-size:13px;font-weight:500;color:#0a2a22;flex-shrink:0;min-width:34px;text-align:right;}

.stats-row-match{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;}
.stat-mini{background:rgba(255,255,255,0.88);border:1px solid rgba(0,0,0,0.12);border-radius:8px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;gap:6px;}
.stat-mini-label{font-size:11px;color:#666;line-height:1.3;}
.stat-mini-val{font-size:14px;font-weight:500;color:#0a2a22;flex-shrink:0;}
.no-data{font-size:13px;color:#888;padding:1rem;}

.nav .back{color:#0a4428;text-decoration:none;font-size:13px;}
.nav .back:hover{color:#000;}

@media (max-width:420px){
  .match-team-logo{width:38px;height:38px;}
  .match-score{font-size:34px;min-width:56px;}
  .match-team-name{font-size:12px;}
  .stats-row-match{grid-template-columns:1fr;}
  .event-main{font-size:12px;}
  .event-score{font-size:12px;min-width:28px;}
  .mvp-name{font-size:13px;}
}
</style>
</head>
<body>
<div class="container" style="max-width:680px;">
  <div class="nav"><a href="history.html?tab=cup" class="back">← PSL Cup</a></div>
  <div id="match-content"></div>
</div>
<script src="cupmatches.js"></script>
<script>
const LOGOS={"BADiles":"logos/badiles.png","Y&Y":"logos/yy.png","R1":"logos/r1.png","Basement Boys":"logos/basement.png","Volos Drummers":"logos/volos.png","Warriors":"logos/warriors.png","Midi Kidz":"logos/midi.png","Babiniotes":"logos/babiniotes.png","Spasmena Mila":"logos/spasmena.png","Phoenix":"logos/phoenix.png","Snipers":"logos/snipers.png","Team Till Death":"logos/ttd.png","A/C":"logos/ac.png","Fintani":"logos/fintani.png","Axtarmades":"logos/axtarmades.png","Chewbacca":"logos/chewbacca.png","Hoopers":"logos/hoopers.png","Trixes":"logos/trixes.png"};
function tlogo(name,size=16){return LOGOS[name]?`<img src="${LOGOS[name]}" onerror="this.style.display='none'" style="width:${size}px;height:${size}px;object-fit:contain;border-radius:2px;vertical-align:middle;margin-right:4px;">`:''}
const id=new URLSearchParams(window.location.search).get('id');
const match=cupMatchData.find(m=>m.id===id);
if(!match){
  document.getElementById('match-content').innerHTML=`<p class="no-data">Match not found. <a href="history.html" style="color:#0a6640;">← Back</a></p>`;
} else {
  document.title=`${match.home} vs ${match.away} — PSL5 Cup`;
  let hGoals=0,hOGs=0,aGoals=0,aOGs=0;
  (match.events||[]).forEach(e=>{
    if(e.type==='goal'){if(e.team===match.home)hGoals++;else aGoals++;}
    else if(e.type==='og'){if(e.team===match.home)aOGs++;else hOGs++;}
  });
  const header=`<div class="match-header">
    <div class="match-teams">
      <div class="match-team"><img class="match-team-logo" src="${LOGOS[match.home]||''}" onerror="this.style.display='none'"><div class="match-team-name">${match.home}</div></div>
      <div class="match-score">${match.hs}–${match.as}</div>
      <div class="match-team"><img class="match-team-logo" src="${LOGOS[match.away]||''}" onerror="this.style.display='none'"><div class="match-team-name">${match.away}</div></div>
    </div>
    <div class="match-meta">${match.date?`<span>📅 ${match.date}</span>`:''}</div>
    <div><span class="cup-badge">🏆 PSL Cup · ${match.round||''}</span></div>
  </div>`;
  const mvp=match.mvp?`<div class="mvp-card"><span style="font-size:22px;">🏅</span><div><div class="mvp-label">Match MVP</div><div class="mvp-name">${match.mvp}</div></div></div>`:'';
  const stats=(match.events&&match.events.length)?`<div class="stats-row-match">
    <div class="stat-mini"><span class="stat-mini-label">${match.home} goals</span><span class="stat-mini-val">${hGoals}</span></div>
    <div class="stat-mini"><span class="stat-mini-label">${match.away} goals</span><span class="stat-mini-val">${aGoals}</span></div>
    <div class="stat-mini"><span class="stat-mini-label">${match.home} own goals</span><span class="stat-mini-val">${hOGs}</span></div>
    <div class="stat-mini"><span class="stat-mini-label">${match.away} own goals</span><span class="stat-mini-val">${aOGs}</span></div>
  </div>`:'';
  let eventRows='';
  if(match.events&&match.events.length){
    eventRows=match.events.map(e=>{
      if(e.type==='goal') return `<div class="event-row"><div class="event-icon icon-goal">G</div><div class="event-body"><div class="event-main">${tlogo(e.team)}<strong>${e.player}</strong></div><div class="event-detail">Goal · ${e.team}</div></div><div class="event-score">${e.hs}–${e.as}</div></div>`;
      if(e.type==='og'){const errTeam=e.team===match.home?match.away:match.home;return `<div class="event-row"><div class="event-icon icon-og">OG</div><div class="event-body"><div class="event-main">${tlogo(errTeam)}<strong>${e.player}</strong></div><div class="event-detail">Own goal · point to ${e.team}</div></div><div class="event-score">${e.hs}–${e.as}</div></div>`;}
      if(e.type==='sub') return `<div class="event-row"><div class="event-icon icon-sub">↕</div><div class="event-body"><div class="event-main">${tlogo(e.team)}<strong>${e.team}</strong></div><div class="event-detail"><span style="color:#0a6640;">▲ ${e.in}</span><span style="color:#c0392b;margin-left:8px;">▼ ${e.out}</span></div></div><div class="event-score">–</div></div>`;
      return '';
    }).join('');
  } else {
    eventRows=`<div class="no-data">No event data available for this match yet.</div>`;
  }
  document.getElementById('match-content').innerHTML=header+mvp+stats+`<div class="events-card"><div class="events-title">Match Events</div>${eventRows}</div>`;
}
</script>
</body>
</html>
