<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSL4 Monte Carlo — Pitchball</title>
<link rel="stylesheet" href="style.css">
<style>
body{background-image:url("bg.png");background-size:cover;background-position:center;background-attachment:fixed;background-repeat:no-repeat;}
h1{color:#fff!important;}
.subtitle{color:rgba(255,255,255,0.55)!important;}
.back{color:rgba(255,255,255,0.5)!important;}
.back:hover{color:#fff!important;}

/* Controls */
.card{background:rgba(0,0,0,0.35)!important;border:1px solid rgba(255,255,255,0.1)!important;backdrop-filter:blur(8px);}
select{background:rgba(0,0,0,0.4)!important;border:1px solid rgba(255,255,255,0.15)!important;color:#fff!important;}
label{color:rgba(255,255,255,0.6)!important;}
.vs{color:rgba(255,255,255,0.4)!important;}
button{background:rgba(76,175,125,0.8)!important;border:none!important;color:#fff!important;}
button:hover{background:rgba(76,175,125,1)!important;}
button:disabled{background:rgba(255,255,255,0.15)!important;}
.running{color:rgba(255,255,255,0.4)!important;text-align:center;padding:1rem;font-size:13px;}

/* Results card */
.results{background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:1.5rem;margin-top:1rem;backdrop-filter:blur(8px);}

/* Win bars */
.win-bars{display:flex;gap:16px;align-items:stretch;margin-bottom:1.5rem;}
.win-side{flex:1;text-align:center;}
.team-name{color:#fff!important;font-size:14px;font-weight:500;margin-bottom:4px;}
.win-pct{font-size:40px;font-weight:500;line-height:1;margin-bottom:4px;}
.win-pct.high{color:#4caf7d;}
.win-pct.low{color:rgba(255,255,255,0.3);}
.win-wins{font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:8px;}
.bar-track{height:8px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;background:rgba(255,255,255,0.2);transition:width 0.5s ease;}
.bar-fill.green{background:#4caf7d;}
.divider{width:1px;background:rgba(255,255,255,0.1);flex-shrink:0;}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:1rem;}
.stat-row{background:rgba(255,255,255,0.06);border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;}
.stat-label{color:rgba(255,255,255,0.45);font-size:12px;}
.stat-val{color:#fff;font-size:14px;font-weight:500;}

/* Score distribution */
.score-dist{margin-top:1.25rem;}
.score-dist-title{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:10px;}
.score-item{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.score-label{font-size:12px;color:rgba(255,255,255,0.5);width:44px;flex-shrink:0;}
.score-bar-track{flex:1;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;}
.score-bar-fill{height:100%;border-radius:3px;background:#4caf7d;}
.score-pct{font-size:12px;color:rgba(255,255,255,0.4);width:38px;text-align:right;flex-shrink:0;}
</style>

</head>
<body>
<div class="container">
  <div class="nav"><a href="hub.html" class="back">← PSL4</a></div>
  <h1>Monte Carlo Simulator</h1>
  <p class="subtitle">Run thousands of simulations to calculate win probability</p>

  <div class="card">
    <div class="row">
      <select id="team1"></select>
      <span class="vs">vs</span>
      <select id="team2"></select>
    </div>
    <div class="row">
      <label>First to</label>
      <select id="target" style="flex:0;width:80px;"><option value="5">5</option><option value="7">7</option></select>
      <label>Simulations</label>
      <select id="sims" style="flex:0;width:100px;">
        <option value="1000">1,000</option>
        <option value="5000">5,000</option>
        <option value="10000" selected>10,000</option>
        <option value="50000">50,000</option>
      </select>
      <button id="runbtn" onclick="runMonteCarlo()">Run simulations</button>
    </div>
  </div>

  <div id="running" class="running hidden">Running simulations...</div>

  <div id="results" class="results hidden">
    <div class="win-bars">
      <div class="win-side">
        <div class="team-name" id="rname1"></div>
        <div class="win-pct" id="rpct1"></div>
        <div class="win-wins" id="rwins1"></div>
        <div class="bar-track"><div class="bar-fill green" id="rbar1" style="width:0%"></div></div>
      </div>
      <div class="divider"></div>
      <div class="win-side">
        <div class="team-name" id="rname2"></div>
        <div class="win-pct" id="rpct2"></div>
        <div class="win-wins" id="rwins2"></div>
        <div class="bar-track"><div class="bar-fill" id="rbar2" style="width:0%"></div></div>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-row"><span class="stat-label">Avg score (T1)</span><span class="stat-val" id="avg-score1"></span></div>
      <div class="stat-row"><span class="stat-label">Avg score (T2)</span><span class="stat-val" id="avg-score2"></span></div>
      <div class="stat-row"><span class="stat-label">Avg errors (T1)</span><span class="stat-val" id="avg-err1"></span></div>
      <div class="stat-row"><span class="stat-label">Avg errors (T2)</span><span class="stat-val" id="avg-err2"></span></div>
      <div class="stat-row"><span class="stat-label">Avg clean pts (T1)</span><span class="stat-val" id="avg-cp1"></span></div>
      <div class="stat-row"><span class="stat-label">Avg clean pts (T2)</span><span class="stat-val" id="avg-cp2"></span></div>
      <div class="stat-row"><span class="stat-label">Avg duration</span><span class="stat-val" id="avg-dur"></span></div>
      <div class="stat-row"><span class="stat-label">Simulations run</span><span class="stat-val" id="sim-count"></span></div>
    </div>
    <div class="score-dist">
      <div class="score-dist-title">Most common scorelines</div>
      <div id="score-dist-list"></div>
    </div>
  </div>
</div>

<script>
const teams={
  "Kleftes":       {att:9,def:8,stm:9,con:8,ten:8},
  "BADiles":       {att:8,def:8,stm:8,con:9,ten:7},
  "Russia":        {att:10,def:8,stm:9,con:8,ten:10},
  "R1":            {att:8,def:7,stm:8,con:8,ten:8},
  "AXR":           {att:7,def:8,stm:8,con:7,ten:7},
  "MAKFI":         {att:7,def:7,stm:8,con:7,ten:8},
  "Fintani":       {att:5,def:6,stm:6,con:5,ten:4},
  "NFFC":          {att:7,def:6,stm:6,con:8,ten:7},
  "Basement Boys": {att:7,def:8,stm:7,con:8,ten:7},
  "Nanoi":         {att:5,def:5,stm:6,con:7,ten:4},
  "Spasmena Mila": {att:6,def:6,stm:7,con:7,ten:6},
  "Mpesala":       {att:7,def:8,stm:8,con:9,ten:6},
  "Y&Y":           {att:5,def:6,stm:7,con:4,ten:6},
  "Didymoi Pyrgoi":{att:8,def:6,stm:6,con:6,ten:8},
  "Axtarmades":    {att:5,def:5,stm:5,con:6,ten:5},
  "Warriors":      {att:5,def:4,stm:5,con:5,ten:4},
  "Mini Kidz":     {att:3,def:3,stm:5,con:4,ten:4},
  "SWMG":          {att:4,def:5,stm:2,con:3,ten:3},
};
const logos={
  "Kleftes":"logos/kleftes.png","BADiles":"logos/badiles.png","Russia":"logos/russia.png",
  "R1":"logos/r1.png","AXR":"logos/axr.png","MAKFI":"logos/makfi.png",
  "Fintani":"logos/fintani.png","NFFC":"logos/nffc.png","Basement Boys":"logos/basement.png",
  "Nanoi":"logos/nanoi.png","Spasmena Mila":"logos/spasmena.png","Mpesala":"logos/mpesala.png",
  "Y&Y":"logos/yy.png","Didymoi Pyrgoi":"logos/didymoi.png","Axtarmades":"logos/axtarmades.png",
  "Warriors":"logos/warriors.png","Mini Kidz":"logos/minikidz.png","SWMG":"logos/swmg.png"
};
const names=Object.keys(teams);
const s1=document.getElementById('team1'),s2=document.getElementById('team2');
names.forEach((n,i)=>{s1.innerHTML+=`<option value="${n}">${n}</option>`;s2.innerHTML+=`<option value="${n}">${n}</option>`;});
s2.selectedIndex=1;
function logoImg(name,size=20){return logos[name]?`<img src="${logos[name]}" style="width:${size}px;height:${size}px;object-fit:contain;border-radius:3px;vertical-align:middle;margin-right:6px;" onerror="this.style.display='none'">`:''}
function rand(){return Math.random();}
function overallRating(t){return t.att*0.35+t.def*0.3+t.stm*0.15+t.con*0.2;}
function winProb(t1,t2,f1,f2,serving){
  const r1=overallRating(t1)*(1-f1*0.25),r2=overallRating(t2)*(1-f2*0.25);
  const e1=r1*(0.85+rand()*0.3)*(serving===1?1.04:0.96);
  const e2=r2*(0.85+rand()*0.3)*(serving===2?1.04:0.96);
  return Math.max(0.04,Math.min(0.96,0.5+(e1-e2)*0.07));
}
function errRate(t1,t2,f1,f2){
  const skill=(overallRating(t1)+overallRating(t2))/2;
  const avgTen=((t1.ten||5)+(t2.ten||5))/2;
  return Math.min(0.94,0.72-(skill/10)*0.3+(f1+f2)/2*0.2+(avgTen-5)*0.015);
}
function simMatch(t1,t2,target){
  let s1=0,s2=0,f1=0,f2=0,serving=rand()<0.5?1:2,rallies=0,time=0,err1=0,err2=0,cp1=0,cp2=0;
  const avgTen=((t1.ten||5)+(t2.ten||5))/2;
  const tenMult=1.3-(avgTen/10)*0.6;
  while(true){
    const avgStm=((t1.stm*(1-f1*0.5))+(t2.stm*(1-f2*0.5)))/2;
    const skill=(overallRating(t1)+overallRating(t2))/2;
    time+=Math.round((10+rand()*60)*(0.5+avgStm/10)*(0.8+skill/10*0.6)*tenMult);
    rallies++;
    const winner=rand()<winProb(t1,t2,f1,f2,serving)?1:2,loser=winner===1?2:1;
    f1=Math.min(0.7,f1+0.018);f2=Math.min(0.7,f2+0.018);
    if(rand()<errRate(t1,t2,f1,f2)){if(loser===1){s2++;err1++;}else{s1++;err2++;}}
    else{if(winner===1){s1++;cp1++;}else{s2++;cp2++;}}
    serving=winner;rallies++;
    if(Math.max(s1,s2)>=target&&Math.abs(s1-s2)>=2)break;
    if(rallies>300)break;
  }
  return{w:s1>s2?1:2,s1,s2,err1,err2,cp1,cp2,time};
}
function runMonteCarlo(){
  const n1=s1.value,n2=s2.value;
  if(n1===n2){alert("Pick two different teams.");return;}
  const t1=teams[n1],t2=teams[n2];
  const target=parseInt(document.getElementById('target').value);
  const numSims=parseInt(document.getElementById('sims').value);
  document.getElementById('runbtn').disabled=true;
  document.getElementById('running').classList.remove('hidden');
  document.getElementById('results').classList.add('hidden');
  setTimeout(()=>{
    let wins1=0,wins2=0,totErr1=0,totErr2=0,totCp1=0,totCp2=0,totTime=0,totS1=0,totS2=0;
    const scorelines={};
    for(let i=0;i<numSims;i++){
      const r=simMatch(t1,t2,target);
      if(r.w===1)wins1++;else wins2++;
      totErr1+=r.err1;totErr2+=r.err2;totCp1+=r.cp1;totCp2+=r.cp2;
      totTime+=r.time;totS1+=r.s1;totS2+=r.s2;
      const key=`${r.s1}-${r.s2}`;scorelines[key]=(scorelines[key]||0)+1;
    }
    const pct1=((wins1/numSims)*100).toFixed(1),pct2=((wins2/numSims)*100).toFixed(1);
    document.getElementById('rname1').innerHTML=`${logoImg(n1,24)}${n1}`;
    document.getElementById('rname2').innerHTML=`${logoImg(n2,24)}${n2}`;
    document.getElementById('rpct1').textContent=pct1+'%';
    document.getElementById('rpct2').textContent=pct2+'%';
    document.getElementById('rpct1').className='win-pct'+(wins1>wins2?' high':' low');
    document.getElementById('rpct2').className='win-pct'+(wins2>wins1?' high':' low');
    document.getElementById('rwins1').textContent=`${wins1.toLocaleString()} wins`;
    document.getElementById('rwins2').textContent=`${wins2.toLocaleString()} wins`;
    document.getElementById('rbar1').style.width=pct1+'%';
    document.getElementById('rbar2').style.width=pct2+'%';
    document.getElementById('avg-score1').textContent=(totS1/numSims).toFixed(1);
    document.getElementById('avg-score2').textContent=(totS2/numSims).toFixed(1);
    document.getElementById('avg-err1').textContent=(totErr1/numSims).toFixed(1);
    document.getElementById('avg-err2').textContent=(totErr2/numSims).toFixed(1);
    document.getElementById('avg-cp1').textContent=(totCp1/numSims).toFixed(1);
    document.getElementById('avg-cp2').textContent=(totCp2/numSims).toFixed(1);
    const avgSecs=Math.round(totTime/numSims);
    document.getElementById('avg-dur').textContent=`${Math.floor(avgSecs/60)}m ${avgSecs%60}s`;
    document.getElementById('sim-count').textContent=numSims.toLocaleString();
    const sorted=Object.entries(scorelines).sort((a,b)=>b[1]-a[1]).slice(0,8);
    const maxCount=sorted[0][1];
    document.getElementById('score-dist-list').innerHTML=sorted.map(([score,count])=>{
      const pct=((count/numSims)*100).toFixed(1);
      const barW=Math.round((count/maxCount)*100);
      return `<div class="score-item"><span class="score-label">${score}</span><div class="score-bar-track"><div class="score-bar-fill" style="width:${barW}%"></div></div><span class="score-pct">${pct}%</span></div>`;
    }).join('');
    document.getElementById('running').classList.add('hidden');
    document.getElementById('results').classList.remove('hidden');
    document.getElementById('runbtn').disabled=false;
  },50);
}
</script>

</body>
</html>
