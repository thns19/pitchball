<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cup Match — PSL4</title>
<link rel="stylesheet" href="style.css">
<style>
body{background-image:url("cupbg.png");background-size:cover;background-position:center;background-attachment:fixed;background-repeat:no-repeat;color:#0a2a22;}
.back{color:#0a4428!important;}
.back:hover{color:#000!important;}

.match-header{background:rgba(255,255,255,0.9);border:1px solid rgba(0,0,0,0.1);border-radius:14px;padding:1.5rem 1.25rem;margin-bottom:1rem;text-align:center;box-shadow:0 2px 16px rgba(0,0,0,0.08);}
.match-teams{display:flex;align-items:center;justify-content:center;gap:0.5rem;margin-bottom:0.75rem;}
.match-team{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;}
.match-team-logo{width:52px;height:52px;object-fit:contain;border-radius:10px;background:rgba(0,0,0,0.05);padding:4px;}
.match-team-name{font-size:14px;font-weight:600;color:#0a2a22;text-align:center;line-height:1.3;word-break:break-word;}
.match-score{font-size:46px;font-weight:700;color:#0a6640;line-height:1;min-width:80px;text-align:center;flex-shrink:0;letter-spacing:-1px;}
.match-meta{font-size:11px;color:#666;margin-top:10px;line-height:1.6;}
.match-meta span{display:inline-block;margin:0 5px;}
.match-badge{display:inline-block;font-size:11px;font-weight:600;color:#0a6640;background:rgba(10,102,64,0.1);border:1px solid rgba(10,102,64,0.25);border-radius:6px;padding:2px 9px;margin-top:6px;}

.mvp-card{background:rgba(255,255,255,0.9);border:1px solid #c8a800;border-radius:12px;padding:0.9rem 1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:12px;}
.mvp-label{font-size:10px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;}
.mvp-name{font-size:15px;font-weight:600;color:#7a6000;margin-top:2px;}

.stats-row-match{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;}
.stat-mini{background:rgba(255,255,255,0.9);border:1px solid rgba(0,0,0,0.1);border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;gap:6px;}
.stat-mini-label{font-size:11px;color:#777;line-height:1.3;}
.stat-mini-val{font-size:15px;font-weight:600;color:#0a2a22;flex-shrink:0;}

.events-card{background:rgba(255,255,255,0.9);border:1px solid rgba(0,0,0,0.1);border-radius:14px;overflow:hidden;margin-bottom:1rem;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.events-title{font-size:11px;color:#777;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;padding:12px 16px;border-bottom:1px solid rgba(0,0,0,0.06);}
.event-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid rgba(0,0,0,0.04);gap:10px;}
.event-row:last-child{border-bottom:none;}
.event-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0;}
.icon-goal{background:#d4f0e2;color:#0a6640;}
.icon-og{background:#fdecea;color:#c0392b;}
.icon-sub{background:#dbeafe;color:#1e40af;}
.event-body{flex:1;min-width:0;}
.event-main{font-size:13px;color:#0a2a22;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.event-detail{font-size:11px;color:#999;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.event-score{font-size:13px;font-weight:600;color:#0a6640;flex-shrink:0;min-width:36px;text-align:right;}
.no-data{font-size:13px;color:#aaa;padding:1.5rem;text-align:center;}

@media(max-width:420px){
  .match-team-logo{width:40px;height:40px;}
  .match-score{font-size:36px;min-width:60px;}
  .match-team-name{font-size:12px;}
  .stats-row-match{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="container" style="max-width:640px;">
  <div class="nav"><a href="history.html?tab=cup" class="back">← PSL Cup</a></div>
  <div id="match-content"></div>
  <div id="comments-mount"></div>
</div>
<script src="cupmatches.js"></script>
<script>
const LOGOS={
  "Kleftes":"logos/kleftes.png","BADiles":"logos/badiles.png","Russia":"logos/russia.png",
  "R1":"logos/r1.png","AXR":"logos/axr.png","MAKFI":"logos/makfi.png",
  "Fintani":"logos/fintani.png","NFFC":"logos/nffc.png","Basement Boys":"logos/basement.png",
  "Nanoi":"logos/nanoi.png","Spasmena Mila":"logos/spasmena.png","Mpesala":"logos/mpesala.png",
  "Y&Y":"logos/yy.png","Didymoi Pyrgoi":"logos/didymoi.png","Axtarmades":"logos/axtarmades.png",
  "Warriors":"logos/warriors.png","Mini Kidz":"logos/minikidz.png","SWMG":"logos/swmg.png"
};
function tlogo(name,size=16){return LOGOS[name]?`<img src="${LOGOS[name]}" onerror="this.style.display='none'" style="width:${size}px;height:${size}px;object-fit:contain;border-radius:3px;vertical-align:middle;margin-right:5px;">`:''}
const id=new URLSearchParams(window.location.search).get('id');
const match=cupMatchData.find(m=>m.id===id);
if(!match){
  document.getElementById('match-content').innerHTML=`<p class="no-data">Match not found.<br><a href="history.html" style="color:#0a6640;">← Back to History</a></p>`;
}else{
  document.title=`${match.home} vs ${match.away} — PSL4 Cup`;
  let hGoals=0,hOGs=0,aGoals=0,aOGs=0;
  (match.events||[]).forEach(e=>{
    if(e.type==='goal'){if(e.team===match.home)hGoals++;else aGoals++;}
    else if(e.type==='og'){if(e.team===match.home)aOGs++;else hOGs++;}
  });
  const header=`<div class="match-header">
    <div class="match-teams">
      <div class="match-team"><img class="match-team-logo" src="${LOGOS[match.home]||''}" onerror="this.style.display='none'"><div class="match-team-name">${match.home}</div></div>
      <div class="match-score">${match.hs}–${match.as}</div>
      <div class="match-team"><img class="match-team-logo" src="${LOGOS[match.away]||''}" onerror="this.style.display='none'"><div class="match-team-name">${match.away}</div></div>
    </div>
    <div class="match-meta">${match.date?`<span>📅 ${match.date}</span>`:''}</div>
    <div><span class="match-badge">🏆 PSL Cup · ${match.round||''}</span></div>
  </div>`;
  const mvp=match.mvp?`<div class="mvp-card"><span style="font-size:24px;">🏅</span><div><div class="mvp-label">Match MVP</div><div class="mvp-name">${match.mvp}</div></div></div>`:'';
  const stats=(match.events&&match.events.length)?`<div class="stats-row-match">
    <div class="stat-mini"><span class="stat-mini-label">${match.home} goals</span><span class="stat-mini-val">${hGoals}</span></div>
    <div class="stat-mini"><span class="stat-mini-label">${match.away} goals</span><span class="stat-mini-val">${aGoals}</span></div>
    <div class="stat-mini"><span class="stat-mini-label">${match.home} own goals</span><span class="stat-mini-val">${hOGs}</span></div>
    <div class="stat-mini"><span class="stat-mini-label">${match.away} own goals</span><span class="stat-mini-val">${aOGs}</span></div>
  </div>`:'';
  let eventRows='';
  if(match.events&&match.events.length){
    eventRows=match.events.map(e=>{
      if(e.type==='goal')return `<div class="event-row"><div class="event-icon icon-goal">G</div><div class="event-body"><div class="event-main">${tlogo(e.team)}<strong>${e.player}</strong></div><div class="event-detail">Goal · ${e.team}</div></div><div class="event-score">${e.hs}–${e.as}</div></div>`;
      if(e.type==='og'){const et=e.team===match.home?match.away:match.home;return `<div class="event-row"><div class="event-icon icon-og">OG</div><div class="event-body"><div class="event-main">${tlogo(et)}<strong>${e.player}</strong></div><div class="event-detail">Own goal · point to ${e.team}</div></div><div class="event-score">${e.hs}–${e.as}</div></div>`;}
      if(e.type==='sub')return `<div class="event-row"><div class="event-icon icon-sub">↕</div><div class="event-body"><div class="event-main">${tlogo(e.team)}<strong>${e.team}</strong></div><div class="event-detail"><span style="color:#0a6640;">▲ ${e.in}</span><span style="color:#c0392b;margin-left:8px;">▼ ${e.out}</span></div></div><div class="event-score">–</div></div>`;
      return '';
    }).join('');
  }else{eventRows=`<div class="no-data">No event data available for this match yet.</div>`;}
  document.getElementById('match-content').innerHTML=header+mvp+stats+`<div class="events-card"><div class="events-title">Match Events</div>${eventRows}</div>`;
}
</script>

<script>
const PSL_BIN_ID  = '69e2a95836566621a8c55b2a';
const PSL_API_KEY = ['$2a$10$H0dlnXhL4nHxUrqvqIuX', 'uWVleB8A4engDopnjE.WngFBheJW.1gu'].join('.');
const PSL_BIN_URL = `https://api.jsonbin.io/v3/b/${PSL_BIN_ID}`;
const PSL_ADMIN   = ['thanos','Yman'];
const REACTIONS   = ['❤️','🥎','🔥','😂','💥','😭','👏'];
let _pslDbCache=null,_pslDbFetching=null;
async function pslDbGet(){if(_pslDbCache)return _pslDbCache;if(_pslDbFetching)return _pslDbFetching;_pslDbFetching=fetch(`${PSL_BIN_URL}/latest`,{headers:{'X-Master-Key':PSL_API_KEY}}).then(r=>r.json()).then(j=>{_pslDbCache=j.record;_pslDbFetching=null;return _pslDbCache;});return _pslDbFetching;}
async function pslDbSet(data){_pslDbCache=data;await fetch(PSL_BIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':PSL_API_KEY},body:JSON.stringify(data)});}
function pslDbInvalidate(){_pslDbCache=null;}
let pslCurrentUser=null;
function pslLoadSession(){const s=localStorage.getItem('psl_session');return s?JSON.parse(s):null;}
function pslSaveSession(u){localStorage.setItem('psl_session',JSON.stringify(u));}
function pslClearSession(){localStorage.removeItem('psl_session');}
async function pslHashPass(pass){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pass+'psl5salt'));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}
function injectAuthStyles(){if(document.getElementById('psl-auth-styles'))return;const s=document.createElement('style');s.id='psl-auth-styles';s.textContent=`#psl-auth-widget{position:fixed;top:12px;right:14px;z-index:99999;font-family:system-ui,sans-serif;}.psl-aw-btn{display:flex;align-items:center;gap:7px;background:rgba(20,20,20,0.92);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:6px 12px 6px 8px;cursor:pointer;backdrop-filter:blur(8px);font-size:12px;color:#fff;font-weight:500;}.psl-aw-btn:hover{border-color:rgba(57,200,119,0.6);}.psl-aw-avatar{width:22px;height:22px;border-radius:50%;background:#39c877;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#000;flex-shrink:0;}.psl-aw-avatar.guest{background:rgba(255,255,255,0.15);color:#fff;font-size:13px;}.psl-aw-drop{position:absolute;top:calc(100% + 8px);right:0;background:#1e2010;border:1px solid rgba(255,255,255,0.15);border-radius:12px;overflow:hidden;min-width:220px;box-shadow:0 8px 32px rgba(0,0,0,0.5);display:none;}.psl-aw-drop.open{display:block;}.psl-aw-drop-header{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.08);font-size:12px;color:rgba(255,255,255,0.4);display:flex;align-items:center;gap:10px;}.psl-aw-drop-header strong{display:block;font-size:14px;color:#fff;margin-bottom:1px;}.psl-aw-drop-item{display:block;width:100%;padding:11px 14px;font-size:13px;font-weight:500;color:#fff;background:none;border:none;cursor:pointer;text-align:left;transition:background 0.1s;font-family:inherit;text-decoration:none;}.psl-aw-drop-item:hover{background:rgba(255,255,255,0.06);}.psl-aw-drop-item.danger{color:#e74c3c;}.psl-aw-divider{border:none;border-top:1px solid rgba(255,255,255,0.08);margin:2px 0;}.psl-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100000;display:flex;align-items:center;justify-content:center;padding:1rem;}.psl-modal{background:#1e2010;border:1px solid rgba(255,255,255,0.15);border-radius:16px;width:100%;max-width:380px;overflow:hidden;}.psl-modal-hd{padding:1.25rem 1.5rem;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:space-between;}.psl-modal-title{font-size:16px;font-weight:600;color:#fff;}.psl-modal-close{background:none;border:none;color:rgba(255,255,255,0.4);cursor:pointer;font-size:20px;line-height:1;padding:2px;font-family:inherit;}.psl-modal-bd{padding:1.5rem;}.psl-form-group{margin-bottom:14px;}.psl-label{font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:5px;display:block;font-weight:500;}.psl-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:8px;padding:9px 12px;font-size:13px;font-family:inherit;box-sizing:border-box;}.psl-input:focus{outline:none;border-color:#39c877;}.psl-input::placeholder{color:rgba(255,255,255,0.3);}.psl-btn-primary{width:100%;padding:10px;background:#39c877;color:#000;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}.psl-btn-primary:hover{background:#2fb366;}.psl-btn-primary:disabled{opacity:0.4;cursor:not-allowed;}.psl-err{font-size:11px;color:#e74c3c;margin-top:6px;}.psl-ok{font-size:11px;color:#39c877;margin-top:6px;}.psl-tabs{display:flex;margin-bottom:1.5rem;background:rgba(255,255,255,0.06);border-radius:8px;padding:3px;gap:3px;}.psl-tab{flex:1;padding:7px;border:none;background:none;border-radius:6px;font-size:12px;font-weight:600;color:rgba(255,255,255,0.4);cursor:pointer;font-family:inherit;}.psl-tab.active{background:#39c877;color:#000;}.psl-avatar-preview{width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.15);display:block;margin:0 auto 12px;}`;document.head.appendChild(s);}
function renderWidget(){if(!document.body){setTimeout(renderWidget,50);return;}const ex=document.getElementById('psl-auth-widget');if(ex)ex.remove();const w=document.createElement('div');w.id='psl-auth-widget';if(pslCurrentUser){const avatarBtn=pslCurrentUser.avatar?`<img src="${pslCurrentUser.avatar}" style="width:22px;height:22px;border-radius:50%;object-fit:cover;flex-shrink:0;" onerror="this.outerHTML='<div class=psl-aw-avatar>${pslCurrentUser.username[0].toUpperCase()}</div>'">`:`<div class="psl-aw-avatar">${pslCurrentUser.username[0].toUpperCase()}</div>`;const avatarDrop=pslCurrentUser.avatar?`<img src="${pslCurrentUser.avatar}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;">`:`<div class="psl-aw-avatar" style="width:36px;height:36px;font-size:15px;">${pslCurrentUser.username[0].toUpperCase()}</div>`;w.innerHTML=`<div class="psl-aw-btn" onclick="pslToggleDrop()">${avatarBtn}<span>${pslCurrentUser.username}</span><span style="color:rgba(255,255,255,0.3);font-size:10px;">▾</span></div><div class="psl-aw-drop" id="psl-aw-drop"><div class="psl-aw-drop-header">${avatarDrop}<div><strong>${pslCurrentUser.username}</strong>${pslCurrentUser.isAdmin?'<span style="color:#39c877;font-size:10px;">⚡ Admin</span>':''}</div></div><a href="/psl5/predindex.html" class="psl-aw-drop-item">🎯 Predictions</a><button class="psl-aw-drop-item" onclick="pslOpenProfile()">🖼️ Edit Profile Picture</button><hr class="psl-aw-divider"><button class="psl-aw-drop-item danger" onclick="pslLogout()">Sign out</button></div>`;}else{w.innerHTML=`<div class="psl-aw-btn" onclick="pslOpenAuth('login')"><div class="psl-aw-avatar guest">👤</div><span>Sign in</span></div>`;}document.body.appendChild(w);document.addEventListener('click',e=>{if(!w.contains(e.target)){const d=document.getElementById('psl-aw-drop');if(d)d.classList.remove('open');}},{capture:true});}
function pslToggleDrop(){document.getElementById('psl-aw-drop')?.classList.toggle('open');}
function pslOpenProfile(){document.getElementById('psl-aw-drop')?.classList.remove('open');if(_authModal)_authModal.remove();const o=document.createElement('div');o.className='psl-modal-overlay';o.id='psl-auth-modal';const current=pslCurrentUser.avatar||'';o.innerHTML=`<div class="psl-modal"><div class="psl-modal-hd"><div class="psl-modal-title">Profile Picture</div><button class="psl-modal-close" onclick="pslCloseAuth()">×</button></div><div class="psl-modal-bd">${current?`<img src="${current}" class="psl-avatar-preview" id="psl-avatar-preview" onerror="this.style.opacity='0.3'">`:`<div style="width:72px;height:72px;border-radius:50%;background:#39c877;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#000;margin:0 auto 12px;" id="psl-avatar-preview">${pslCurrentUser.username[0].toUpperCase()}</div>`}<div class="psl-form-group"><label class="psl-label">Image URL</label><input class="psl-input" id="psl-avatar-url" placeholder="https://..." value="${current}" oninput="pslPreviewAvatar(this.value)"></div><p style="font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:14px;line-height:1.5;">Paste a direct link to any image. Tip: upload to <a href="https://imgur.com" target="_blank" style="color:#39c877;">imgur.com</a> and use the direct link.</p><div class="psl-err" id="psl-avatar-err" style="display:none;"></div><div class="psl-ok" id="psl-avatar-ok" style="display:none;">Saved!</div><button class="psl-btn-primary" id="psl-avatar-btn" onclick="pslSaveAvatar()">Save</button>${current?`<button style="width:100%;padding:9px;background:none;border:1px solid rgba(231,76,60,0.3);color:#e74c3c;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;margin-top:8px;" onclick="pslRemoveAvatar()">Remove picture</button>`:''}</div></div>`;o.addEventListener('click',e=>{if(e.target===o)pslCloseAuth();});document.body.appendChild(o);_authModal=o;}
function pslPreviewAvatar(url){const el=document.getElementById('psl-avatar-preview');if(!el)return;if(url){el.outerHTML=`<img src="${url}" class="psl-avatar-preview" id="psl-avatar-preview" onerror="this.style.opacity='0.3'">`; }}
async function pslSaveAvatar(){const url=document.getElementById('psl-avatar-url').value.trim();const err=document.getElementById('psl-avatar-err');const ok=document.getElementById('psl-avatar-ok');const btn=document.getElementById('psl-avatar-btn');err.style.display='none';ok.style.display='none';btn.disabled=true;btn.textContent='Saving...';try{const db=await pslDbGet();const users=db.users||{};const uKey=pslCurrentUser.username.toLowerCase();if(!users[uKey]){err.textContent='User not found.';err.style.display='block';return;}users[uKey].avatar=url||null;await pslDbSet({...db,users});pslDbInvalidate();pslCurrentUser.avatar=url||null;pslSaveSession(pslCurrentUser);ok.style.display='block';setTimeout(()=>{pslCloseAuth();renderWidget();},800);}catch(e){err.textContent='Connection error. Try again.';err.style.display='block';}finally{btn.disabled=false;btn.textContent='Save';}}
async function pslRemoveAvatar(){document.getElementById('psl-avatar-url').value='';await pslSaveAvatar();}
let _authModal=null;
function pslOpenAuth(tab='login'){if(_authModal)_authModal.remove();const o=document.createElement('div');o.className='psl-modal-overlay';o.id='psl-auth-modal';o.innerHTML=`<div class="psl-modal"><div class="psl-modal-hd"><div class="psl-modal-title">PSL Account</div><button class="psl-modal-close" onclick="pslCloseAuth()">×</button></div><div class="psl-modal-bd"><div class="psl-tabs"><button class="psl-tab ${tab==='login'?'active':''}" onclick="pslSwitchTab('login')">Sign In</button><button class="psl-tab ${tab==='register'?'active':''}" onclick="pslSwitchTab('register')">Register</button></div><div id="psl-tab-login" ${tab!=='login'?'style="display:none"':''}><div class="psl-form-group"><label class="psl-label">Username or Email</label><input class="psl-input" id="psl-li-user" placeholder="Enter username or email"></div><div class="psl-form-group"><label class="psl-label">Password</label><input class="psl-input" id="psl-li-pass" type="password" placeholder="Enter password"></div><div class="psl-err" id="psl-li-err" style="display:none"></div><button class="psl-btn-primary" id="psl-li-btn" onclick="pslDoLogin()">Sign In</button></div><div id="psl-tab-register" ${tab!=='register'?'style="display:none"':''}><div class="psl-form-group"><label class="psl-label">Username</label><input class="psl-input" id="psl-rg-user" placeholder="Choose a username" maxlength="20"></div><div class="psl-form-group"><label class="psl-label">Email</label><input class="psl-input" id="psl-rg-email" type="email" placeholder="your@email.com"></div><div class="psl-form-group"><label class="psl-label">Password</label><input class="psl-input" id="psl-rg-pass" type="password" placeholder="Min. 6 characters"></div><div class="psl-err" id="psl-rg-err" style="display:none"></div><button class="psl-btn-primary" id="psl-rg-btn" onclick="pslDoRegister()">Create Account</button></div></div></div>`;o.addEventListener('click',e=>{if(e.target===o)pslCloseAuth();});document.body.appendChild(o);_authModal=o;}
function pslCloseAuth(){_authModal?.remove();_authModal=null;}
function pslSwitchTab(tab){document.getElementById('psl-tab-login').style.display=tab==='login'?'':'none';document.getElementById('psl-tab-register').style.display=tab==='register'?'':'none';document.querySelectorAll('.psl-tab').forEach((b,i)=>b.classList.toggle('active',i===(tab==='login'?0:1)));}
async function pslDoLogin(){const raw=document.getElementById('psl-li-user').value.trim();const pass=document.getElementById('psl-li-pass').value;const e=document.getElementById('psl-li-err');e.style.display='none';if(!raw||!pass){e.textContent='Please fill in all fields.';e.style.display='block';return;}const btn=document.getElementById('psl-li-btn');btn.disabled=true;btn.textContent='Signing in...';try{const db=await pslDbGet();const users=db.users||{};const user=Object.values(users).find(u=>u.username.toLowerCase()===raw.toLowerCase()||u.email.toLowerCase()===raw.toLowerCase());if(!user){e.textContent='Account not found.';e.style.display='block';return;}const hash=await pslHashPass(pass);if(hash!==user.passHash){e.textContent='Incorrect password.';e.style.display='block';return;}pslCurrentUser={username:user.username,email:user.email,avatar:user.avatar||null,isAdmin:user.username.toLowerCase()===PSL_ADMIN};pslSaveSession(pslCurrentUser);pslCloseAuth();renderWidget();if(typeof onPslLogin==='function')onPslLogin(pslCurrentUser);}catch(err){e.textContent='Connection error. Try again.';e.style.display='block';}finally{btn.disabled=false;btn.textContent='Sign In';}}
async function pslDoRegister(){const username=document.getElementById('psl-rg-user').value.trim();const email=document.getElementById('psl-rg-email').value.trim().toLowerCase();const pass=document.getElementById('psl-rg-pass').value;const e=document.getElementById('psl-rg-err');e.style.display='none';if(!username||!email||!pass){e.textContent='Please fill in all fields.';e.style.display='block';return;}if(username.length<2){e.textContent='Username too short.';e.style.display='block';return;}if(pass.length<6){e.textContent='Password must be 6+ characters.';e.style.display='block';return;}const btn=document.getElementById('psl-rg-btn');btn.disabled=true;btn.textContent='Creating...';try{const db=await pslDbGet();const users=db.users||{};if(users[username.toLowerCase()]){e.textContent='Username taken.';e.style.display='block';return;}const passHash=await pslHashPass(pass);users[username.toLowerCase()]={username,email,passHash,avatar:null,joined:new Date().toISOString()};await pslDbSet({...db,users});pslDbInvalidate();pslCurrentUser={username,email,avatar:null,isAdmin:username.toLowerCase()===PSL_ADMIN};pslSaveSession(pslCurrentUser);pslCloseAuth();renderWidget();if(typeof onPslLogin==='function')onPslLogin(pslCurrentUser);}catch(err){e.textContent='Connection error. Try again.';e.style.display='block';}finally{btn.disabled=false;btn.textContent='Create Account';}}
function pslLogout(){pslClearSession();pslCurrentUser=null;pslDbInvalidate();renderWidget();if(typeof onPslLogout==='function')onPslLogout();}
async function pslAuthInit(){injectAuthStyles();const session=pslLoadSession();if(session){try{const db=await pslDbGet();const uData=(db.users||{})[session.username.toLowerCase()];if(uData){pslCurrentUser={username:uData.username,email:uData.email,avatar:uData.avatar||null,isAdmin:uData.username.toLowerCase()===PSL_ADMIN};pslSaveSession(pslCurrentUser);}else{pslClearSession();}}catch(err){pslCurrentUser=session;}}renderWidget();if(pslCurrentUser&&typeof onPslLogin==='function')onPslLogin(pslCurrentUser);}
injectAuthStyles();
document.addEventListener('DOMContentLoaded',pslAuthInit);
</script>
<script>
// ── PSL COMMENTS ─────────────────────────────────────────────
function pslInitComments(matchId,mountEl){if(!mountEl)return;injectCommentStyles();mountEl.innerHTML=`<div class="psl-comments"><div class="psl-comments-loading">Loading comments...</div></div>`;pslDbGet().then(db=>{const comments=((db.comments||{})[matchId])||[];renderComments(matchId,mountEl,comments);}).catch(()=>{mountEl.innerHTML=`<div class="psl-comments"><div class="psl-comments-empty">Could not load comments.</div></div>`;});}
function injectCommentStyles(){if(document.getElementById('psl-comment-styles'))return;const s=document.createElement('style');s.id='psl-comment-styles';s.textContent=`.psl-comments{font-family:system-ui,sans-serif;margin-top:2rem;padding-bottom:3rem;}.psl-comments-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(215,219,200,0.4);margin-bottom:1rem;padding-bottom:8px;border-bottom:1px solid rgba(215,219,200,0.1);display:flex;align-items:center;gap:8px;}.psl-comments-count{background:rgba(57,200,119,0.15);color:#39c877;border-radius:10px;padding:1px 8px;font-size:10px;}.psl-compose{background:rgba(215,219,200,0.04);border:1px solid rgba(215,219,200,0.12);border-radius:12px;padding:12px;margin-bottom:1.25rem;}.psl-compose-inner{display:flex;gap:10px;align-items:flex-start;}.psl-compose-avatar{width:28px;height:28px;border-radius:50%;background:#39c877;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#000;flex-shrink:0;margin-top:2px;}.psl-compose-avatar.guest{background:rgba(215,219,200,0.15);color:rgba(215,219,200,0.4);font-size:14px;}.psl-compose-right{flex:1;min-width:0;}.psl-compose-input{width:100%;background:transparent;border:none;color:#D7DBC8;font-size:13px;font-family:inherit;resize:none;outline:none;min-height:36px;max-height:120px;line-height:1.5;}.psl-compose-input::placeholder{color:rgba(215,219,200,0.3);}.psl-compose-footer{display:flex;justify-content:flex-end;margin-top:8px;}.psl-submit-btn{background:#39c877;color:#000;border:none;border-radius:8px;padding:6px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}.psl-submit-btn:disabled{opacity:0.4;cursor:not-allowed;}.psl-login-prompt{font-size:13px;color:rgba(215,219,200,0.4);display:flex;align-items:center;gap:8px;}.psl-login-prompt a{color:#39c877;cursor:pointer;}.psl-comment{display:flex;gap:10px;padding:12px 0;border-bottom:1px solid rgba(215,219,200,0.06);}.psl-comment:last-child{border-bottom:none;}.psl-c-avatar{width:28px;height:28px;border-radius:50%;background:#39c877;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#000;flex-shrink:0;overflow:hidden;}.psl-c-body{flex:1;min-width:0;}.psl-c-header{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;}.psl-c-user{font-size:13px;font-weight:600;color:#D7DBC8;}.psl-c-user.admin-user::after{content:'⚡';margin-left:3px;font-size:10px;color:#39c877;}.psl-c-time{font-size:11px;color:rgba(215,219,200,0.35);}.psl-c-text{font-size:13px;color:rgba(215,219,200,0.85);line-height:1.55;word-break:break-word;}.psl-c-actions{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap;}.psl-react-btn{display:flex;align-items:center;gap:4px;background:rgba(215,219,200,0.06);border:1px solid rgba(215,219,200,0.1);border-radius:20px;padding:3px 9px;font-size:12px;cursor:pointer;color:#D7DBC8;font-family:inherit;}.psl-react-btn.reacted{background:rgba(57,200,119,0.12);border-color:rgba(57,200,119,0.3);color:#39c877;}.psl-react-count{font-size:11px;font-weight:600;}.psl-reply-btn{font-size:12px;color:rgba(215,219,200,0.4);background:none;border:none;cursor:pointer;font-family:inherit;padding:3px 6px;border-radius:6px;}.psl-reply-btn:hover{color:#39c877;}.psl-delete-btn{font-size:11px;color:rgba(231,76,60,0.5);background:none;border:none;cursor:pointer;font-family:inherit;padding:3px 6px;border-radius:6px;margin-left:auto;}.psl-delete-btn:hover{color:#e74c3c;}.psl-react-picker{display:none;position:absolute;background:#2a3018;border:1px solid rgba(215,219,200,0.15);border-radius:20px;padding:6px 10px;box-shadow:0 4px 20px rgba(0,0,0,0.4);z-index:100;gap:6px;}.psl-react-picker.open{display:flex;}.psl-react-wrap{position:relative;display:inline-block;}.psl-react-pick-btn{font-size:18px;background:none;border:none;cursor:pointer;border-radius:8px;padding:3px 5px;line-height:1;}.psl-react-pick-btn:hover{transform:scale(1.3);}.psl-replies{margin-top:10px;margin-left:38px;border-left:2px solid rgba(215,219,200,0.08);padding-left:12px;}.psl-reply-compose{margin-top:10px;margin-left:38px;}.psl-reply-input-wrap{display:flex;gap:8px;align-items:flex-start;}.psl-reply-input{flex:1;background:rgba(215,219,200,0.06);border:1px solid rgba(215,219,200,0.15);color:#D7DBC8;border-radius:8px;padding:7px 10px;font-size:12px;font-family:inherit;resize:none;outline:none;}.psl-reply-input:focus{border-color:#39c877;}.psl-reply-submit{background:#39c877;color:#000;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;}.psl-show-replies-btn{font-size:12px;color:#39c877;background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 0;margin-top:4px;}.psl-comments-empty{font-size:13px;color:rgba(215,219,200,0.3);padding:1.5rem 0;text-align:center;}.psl-comments-loading{font-size:13px;color:rgba(215,219,200,0.3);padding:1rem 0;text-align:center;}`;document.head.appendChild(s);}
function pslTimeAgo(iso){const d=Date.now()-new Date(iso).getTime(),m=Math.floor(d/60000);if(m<1)return'just now';if(m<60)return`${m}m ago`;const h=Math.floor(m/60);if(h<24)return`${h}h ago`;const dy=Math.floor(h/24);if(dy<7)return`${dy}d ago`;return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
const PSL_AVATAR_COLORS=['#39c877','#f5c842','#5dade2','#e74c3c','#c084fc','#f39c12','#1abc9c'];
function pslAvatarColor(name){let h=0;for(const c of name)h=(h*31+c.charCodeAt(0))&0xffffffff;return PSL_AVATAR_COLORS[Math.abs(h)%PSL_AVATAR_COLORS.length];}
function pslAvatarEl(user,size=28){if(user&&user.avatar)return`<img src="${user.avatar}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;" onerror="this.style.display='none'">`;return`<div class="psl-c-avatar" style="background:${pslAvatarColor(user?.username||'?')};width:${size}px;height:${size}px;">${(user?.username||'?')[0].toUpperCase()}</div>`;}
function renderComments(matchId,mountEl,comments){
  const user=pslCurrentUser;
  const count=comments.length+comments.reduce((s,c)=>s+(c.replies||[]).length,0);
  let composeHtml;
  if(user){const col=pslAvatarColor(user.username);const av=user.avatar?`<img src="${user.avatar}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;margin-top:2px;">`:`<div class="psl-compose-avatar" style="background:${col}">${user.username[0].toUpperCase()}</div>`;composeHtml=`<div class="psl-compose"><div class="psl-compose-inner">${av}<div class="psl-compose-right"><textarea class="psl-compose-input" id="psl-new-comment" placeholder="Share your thoughts on this match..." rows="2"></textarea><div class="psl-compose-footer"><button class="psl-submit-btn" onclick="pslPostComment('${matchId}')">Post</button></div></div></div></div>`;}
  else{composeHtml=`<div class="psl-compose"><div class="psl-login-prompt"><div class="psl-compose-avatar guest">👤</div><span><a onclick="pslOpenAuth('login')">Sign in</a> or <a onclick="pslOpenAuth('register')">register</a> to comment</span></div></div>`;}
  const commentsHtml=comments.length?comments.map(c=>renderComment(matchId,c,false)).join(''):`<div class="psl-comments-empty">No comments yet. Be the first!</div>`;
  mountEl.innerHTML=`<div class="psl-comments"><div class="psl-comments-title">Comments<span class="psl-comments-count">${count}</span></div>${composeHtml}<div id="psl-comments-list">${commentsHtml}</div></div>`;
}
function renderComment(matchId,c,isReply){
  const user=pslCurrentUser;const col=pslAvatarColor(c.user);const isAdmin=c.user.toLowerCase()==='thanos';const canDelete=user&&(user.isAdmin||user.username===c.user);
  const av=c.avatar?`<img src="${c.avatar}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;">`:`<div class="psl-c-avatar" style="background:${col};">${c.user[0].toUpperCase()}</div>`;
  const reactionsHtml=REACTIONS.map(emoji=>{const users=(c.reactions||{})[emoji]||[];if(!users.length&&!user)return'';const reacted=user&&users.includes(user.username);return`<button class="psl-react-btn ${reacted?'reacted':''}" onclick="pslToggleReaction('${matchId}','${c.id}',${isReply?`'${c._parentId}'`:'null'},'${emoji}')">${emoji}<span class="psl-react-count">${users.length||''}</span></button>`;}).filter(Boolean).join('');
  const addReactBtn=user?`<div class="psl-react-wrap"><button class="psl-reply-btn" onclick="pslTogglePicker('picker-${c.id}')">😊+</button><div class="psl-react-picker" id="picker-${c.id}">${REACTIONS.map(e=>`<button class="psl-react-pick-btn" onclick="pslPickReaction('${matchId}','${c.id}',${isReply?`'${c._parentId}'`:'null'},'${e}','picker-${c.id}')">${e}</button>`).join('')}</div></div>`:'';
  const replyBtn=!isReply&&user?`<button class="psl-reply-btn" onclick="pslToggleReplyBox('${c.id}')">↩ Reply</button>`:'';
  const deleteBtn=canDelete?`<button class="psl-delete-btn" onclick="pslDeleteComment('${matchId}','${c.id}',${isReply?`'${c._parentId}'`:'null'})">✕ delete</button>`:'';
  let repliesHtml='';
  if(!isReply&&(c.replies||[]).length){const shown=c._showReplies?c.replies:c.replies.slice(0,2);const more=c.replies.length-shown.length;repliesHtml=`<div class="psl-replies">${shown.map(r=>renderComment(matchId,{...r,_parentId:c.id},true)).join('')}${more>0?`<button class="psl-show-replies-btn" onclick="pslShowAllReplies('${matchId}','${c.id}')">Show ${more} more ${more===1?'reply':'replies'}</button>`:''}</div>`;}
  const replyCompose=!isReply?`<div class="psl-reply-compose" id="reply-box-${c.id}" style="display:none;"><div class="psl-reply-input-wrap"><textarea class="psl-reply-input" id="reply-input-${c.id}" placeholder="Write a reply..." rows="2"></textarea><button class="psl-reply-submit" onclick="pslPostReply('${matchId}','${c.id}')">↩</button></div></div>`:'';
  return`<div class="psl-comment" id="comment-${c.id}">${av}<div class="psl-c-body"><div class="psl-c-header"><span class="psl-c-user ${isAdmin?'admin-user':''}">${c.user}</span><span class="psl-c-time">${pslTimeAgo(c.time)}</span></div><div class="psl-c-text">${escHtml(c.text)}</div><div class="psl-c-actions">${reactionsHtml}${addReactBtn}${replyBtn}${deleteBtn}</div>${repliesHtml}${replyCompose}</div></div>`;
}
function escHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
async function pslPostComment(matchId){if(!pslCurrentUser)return;const input=document.getElementById('psl-new-comment');const text=input.value.trim();if(!text)return;const btn=input.closest('.psl-compose').querySelector('.psl-submit-btn');btn.disabled=true;try{pslDbInvalidate();const db=await pslDbGet();if(!db.comments)db.comments={};if(!db.comments[matchId])db.comments[matchId]=[];db.comments[matchId].unshift({id:'c_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),user:pslCurrentUser.username,avatar:pslCurrentUser.avatar||null,text,time:new Date().toISOString(),reactions:{},replies:[]});await pslDbSet(db);pslDbInvalidate();const fresh=await pslDbGet();const mount=document.getElementById('comments-mount');renderComments(matchId,mount,(fresh.comments||{})[matchId]||[]);}catch(e){btn.disabled=false;}}
async function pslPostReply(matchId,commentId){if(!pslCurrentUser)return;const input=document.getElementById(`reply-input-${commentId}`);const text=input?.value.trim();if(!text)return;const btn=input.closest('.psl-reply-input-wrap').querySelector('.psl-reply-submit');btn.disabled=true;try{pslDbInvalidate();const db=await pslDbGet();const comments=(db.comments||{})[matchId]||[];const parent=comments.find(c=>c.id===commentId);if(!parent)return;if(!parent.replies)parent.replies=[];parent.replies.push({id:'r_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),user:pslCurrentUser.username,avatar:pslCurrentUser.avatar||null,text,time:new Date().toISOString(),reactions:{}});await pslDbSet(db);pslDbInvalidate();const fresh=await pslDbGet();const mount=document.getElementById('comments-mount');renderComments(matchId,mount,(fresh.comments||{})[matchId]||[]);}catch(e){btn.disabled=false;}}
async function pslToggleReaction(matchId,commentId,parentId,emoji){if(!pslCurrentUser){pslOpenAuth('login');return;}pslDbInvalidate();const db=await pslDbGet();const comments=(db.comments||{})[matchId]||[];let target;if(parentId&&parentId!=='null'){const parent=comments.find(c=>c.id===parentId);target=parent?.replies?.find(r=>r.id===commentId);}else{target=comments.find(c=>c.id===commentId);}if(!target)return;if(!target.reactions)target.reactions={};if(!target.reactions[emoji])target.reactions[emoji]=[];const idx=target.reactions[emoji].indexOf(pslCurrentUser.username);if(idx>=0)target.reactions[emoji].splice(idx,1);else target.reactions[emoji].push(pslCurrentUser.username);await pslDbSet(db);pslDbInvalidate();const fresh=await pslDbGet();const mount=document.getElementById('comments-mount');if(mount)renderComments(matchId,mount,(fresh.comments||{})[matchId]||[]);}
async function pslPickReaction(matchId,commentId,parentId,emoji,pickerId){document.getElementById(pickerId)?.classList.remove('open');await pslToggleReaction(matchId,commentId,parentId,emoji);}
function pslTogglePicker(id){document.querySelectorAll('.psl-react-picker.open').forEach(p=>{if(p.id!==id)p.classList.remove('open');});document.getElementById(id)?.classList.toggle('open');}
async function pslDeleteComment(matchId,commentId,parentId){if(!pslCurrentUser)return;if(!confirm('Delete this comment?'))return;pslDbInvalidate();const db=await pslDbGet();const comments=(db.comments||{})[matchId]||[];if(parentId&&parentId!=='null'){const parent=comments.find(c=>c.id===parentId);if(parent)parent.replies=(parent.replies||[]).filter(r=>r.id!==commentId);}else{db.comments[matchId]=comments.filter(c=>c.id!==commentId);}await pslDbSet(db);pslDbInvalidate();const fresh=await pslDbGet();const mount=document.getElementById('comments-mount');if(mount)renderComments(matchId,mount,(fresh.comments||{})[matchId]||[]);}
async function pslShowAllReplies(matchId,commentId){pslDbInvalidate();const db=await pslDbGet();const comments=(db.comments||{})[matchId]||[];const c=comments.find(x=>x.id===commentId);if(c)c._showReplies=true;const mount=document.getElementById('comments-mount');if(mount)renderComments(matchId,mount,comments);}
function pslToggleReplyBox(commentId){const box=document.getElementById(`reply-box-${commentId}`);if(!box)return;const open=box.style.display==='none'||box.style.display==='';box.style.display=open?'block':'none';if(open)document.getElementById(`reply-input-${commentId}`)?.focus();}
document.addEventListener('click',e=>{if(!e.target.closest('.psl-react-wrap'))document.querySelectorAll('.psl-react-picker.open').forEach(p=>p.classList.remove('open'));});

// ── Init comments once match is loaded ────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const id = new URLSearchParams(window.location.search).get('id');
  if (id) pslInitComments(id, document.getElementById('comments-mount'));
});
</script>
