<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match — PSL4</title>
<link rel="stylesheet" href="style.css">
<style>
body{background-image:url("bg.png");background-size:cover;background-position:center;background-attachment:fixed;background-repeat:no-repeat;}
.match-header{background:#fff;border:1px solid #e8e8e4;border-radius:14px;padding:1.5rem 1.25rem;margin-bottom:1rem;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,0.06);}
.match-teams{display:flex;align-items:center;justify-content:center;gap:0.5rem;margin-bottom:0.75rem;}
.match-team{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;}
.match-team-logo{width:52px;height:52px;object-fit:contain;border-radius:10px;background:#f5f5f2;padding:4px;}
.match-team-name{font-size:14px;font-weight:600;color:#1a1a1a;text-align:center;line-height:1.3;word-break:break-word;}
.match-score{font-size:46px;font-weight:700;color:#1a1a1a;line-height:1;min-width:80px;text-align:center;flex-shrink:0;letter-spacing:-1px;}
.match-meta{font-size:11px;color:#999;margin-top:10px;line-height:1.6;}
.match-meta span{display:inline-block;margin:0 5px;}
.match-badge{display:inline-block;font-size:11px;font-weight:600;color:#4caf7d;background:rgba(76,175,125,0.1);border:1px solid rgba(76,175,125,0.25);border-radius:6px;padding:2px 9px;margin-top:6px;}
.mvp-card{background:#fff;border:1px solid #f5c842;border-radius:12px;padding:0.9rem 1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(245,200,66,0.1);}
.mvp-label{font-size:10px;color:#999;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;}
.mvp-name{font-size:15px;font-weight:600;color:#b8940a;margin-top:2px;}
.stats-row-match{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;}
.stat-mini{background:#fff;border:1px solid #e8e8e4;border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;gap:6px;box-shadow:0 1px 4px rgba(0,0,0,0.04);}
.stat-mini-label{font-size:11px;color:#999;line-height:1.3;}
.stat-mini-val{font-size:15px;font-weight:600;color:#1a1a1a;flex-shrink:0;}
.events-card{background:#fff;border:1px solid #e8e8e4;border-radius:14px;overflow:hidden;margin-bottom:1rem;box-shadow:0 2px 12px rgba(0,0,0,0.05);}
.events-title{font-size:11px;color:#999;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;padding:12px 16px;border-bottom:1px solid #f0f0ec;}
.event-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid #f5f5f2;gap:10px;}
.event-row:last-child{border-bottom:none;}
.event-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;flex-shrink:0;}
.icon-goal{background:#e8f5ee;color:#2d8a5a;}
.icon-og{background:#fdecea;color:#c0392b;}
.icon-sub{background:#e8f0fd;color:#2471a3;}
.event-body{flex:1;min-width:0;}
.event-main{font-size:13px;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.event-detail{font-size:11px;color:#aaa;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.event-score{font-size:13px;font-weight:600;color:#4caf7d;flex-shrink:0;min-width:36px;text-align:right;}
.no-data{font-size:13px;color:#bbb;padding:1.5rem;text-align:center;}
@media(max-width:420px){
  .match-team-logo{width:40px;height:40px;}
  .match-score{font-size:36px;min-width:60px;}
  .match-team-name{font-size:12px;}
  .stats-row-match{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="container" style="max-width:640px;">
  <div class="nav"><a href="history.html" class="back">← Season History</a></div>
  <div id="match-content"></div>
</div>
<script src="matches.js"></script>
<script>
const LOGOS={
  "Kleftes":"logos/kleftes.png","BADiles":"logos/badiles.png","Russia":"logos/russia.png",
  "R1":"logos/r1.png","AXR":"logos/axr.png","MAKFI":"logos/makfi.png",
  "Fintani":"logos/fintani.png","NFFC":"logos/nffc.png","Basement Boys":"logos/basement.png",
  "Nanoi":"logos/nanoi.png","Spasmena Mila":"logos/spasmena.png","Mpesala":"logos/mpesala.png",
  "Y&Y":"logos/yy.png","Didymoi Pyrgoi":"logos/didymoi.png","Axtarmades":"logos/axtarmades.png",
  "Warriors":"logos/warriors.png","Mini Kidz":"logos/minikidz.png","SWMG":"logos/swmg.png"
};
function tlogo(name,size=16){return LOGOS[name]?`<img src="${LOGOS[name]}" onerror="this.style.display='none'" style="width:${size}px;height:${size}px;object-fit:contain;border-radius:3px;vertical-align:middle;margin-right:5px;">`:''}
const id=new URLSearchParams(window.location.search).get('id');
const match=matchData.find(m=>m.id===id);
if(!match){
  document.getElementById('match-content').innerHTML=`<p class="no-data">Match not found.<br><a href="history.html" style="color:#4caf7d;">← Back to History</a></p>`;
}else{
  document.title=`${match.home} vs ${match.away} — PSL4`;
  let hGoals=0,hOGs=0,aGoals=0,aOGs=0;
  (match.events||[]).forEach(e=>{
    if(e.type==='goal'){if(e.team===match.home)hGoals++;else aGoals++;}
    else if(e.type==='og'){if(e.team===match.home)aOGs++;else hOGs++;}
  });
  const header=`<div class="match-header">
    <div class="match-teams">
      <div class="match-team"><img class="match-team-logo" src="${LOGOS[match.home]||''}" onerror="this.style.display='none'"><div class="match-team-name">${match.home}</div></div>
      <div class="match-score">${match.hs}–${match.as}</div>
      <div class="match-team"><img class="match-team-logo" src="${LOGOS[match.away]||''}" onerror="this.style.display='none'"><div class="match-team-name">${match.away}</div></div>
    </div>
    <div class="match-meta">${match.date?`<span>📅 ${match.date}</span>`:''}</div>
    <div><span class="match-badge">PSL4 League Stage · ${match.round||`MD${match.md||''}`}</span></div>
  </div>`;
  const mvp=match.mvp?`<div class="mvp-card"><span style="font-size:24px;">🏅</span><div><div class="mvp-label">Match MVP</div><div class="mvp-name">${match.mvp}</div></div></div>`:'';
  const stats=(match.events&&match.events.length)?`<div class="stats-row-match">
    <div class="stat-mini"><span class="stat-mini-label">${match.home} goals</span><span class="stat-mini-val">${hGoals}</span></div>
    <div class="stat-mini"><span class="stat-mini-label">${match.away} goals</span><span class="stat-mini-val">${aGoals}</span></div>
    <div class="stat-mini"><span class="stat-mini-label">${match.home} own goals</span><span class="stat-mini-val">${hOGs}</span></div>
    <div class="stat-mini"><span class="stat-mini-label">${match.away} own goals</span><span class="stat-mini-val">${aOGs}</span></div>
  </div>`:'';
  let eventRows='';
  if(match.events&&match.events.length){
    eventRows=match.events.map(e=>{
      if(e.type==='goal')return `<div class="event-row"><div class="event-icon icon-goal">G</div><div class="event-body"><div class="event-main">${tlogo(e.team)}<strong>${e.player}</strong></div><div class="event-detail">Goal · ${e.team}</div></div><div class="event-score">${e.hs}–${e.as}</div></div>`;
      if(e.type==='og'){const et=e.team===match.home?match.away:match.home;return `<div class="event-row"><div class="event-icon icon-og">OG</div><div class="event-body"><div class="event-main">${tlogo(et)}<strong>${e.player}</strong></div><div class="event-detail">Own goal · point to ${e.team}</div></div><div class="event-score">${e.hs}–${e.as}</div></div>`;}
      if(e.type==='sub')return `<div class="event-row"><div class="event-icon icon-sub">↕</div><div class="event-body"><div class="event-main">${tlogo(e.team)}<strong>${e.team}</strong></div><div class="event-detail"><span style="color:#2d8a5a;">▲ ${e.in}</span><span style="color:#c0392b;margin-left:8px;">▼ ${e.out}</span></div></div><div class="event-score">–</div></div>`;
      return '';
    }).join('');
  }else{eventRows=`<div class="no-data">No event data available for this match yet.</div>`;}
  document.getElementById('match-content').innerHTML=header+mvp+stats+`<div class="events-card"><div class="events-title">Match Events</div>${eventRows}</div>`;
}
</script>
</body>
</html>
